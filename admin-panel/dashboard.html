<!DOCTYPE html>
<html>
<head>
  <title>CRONCUL Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 CRONCUL DASHBOARD</h1>

<div class="stats">
  <div class="card">Videos: <span id="videos">0</span></div>
  <div class="card">Admins: <span id="admins">0</span></div>
</div>

<hr>

<h2>🎬 Upload Video</h2>

<input id="title" placeholder="Title">

<input type="file" id="video">
<input type="file" id="thumbnail">

<button onclick="uploadVideo()">Upload</button>


<hr>

<h2>📺 Videos List</h2>
<div id="list"></div>

<script src="app.js"></script>
</body>
</html>
